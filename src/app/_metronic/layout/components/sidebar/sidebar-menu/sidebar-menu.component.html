<div
  id="kt_app_sidebar_menu_scroll"
  class="scroll-y my-5 mx-3"
  data-kt-scroll="true"
  data-kt-scroll-activate="true"
  data-kt-scroll-height="auto"
  data-kt-scroll-dependencies="#kt_app_sidebar_logo, #kt_app_sidebar_footer"
  data-kt-scroll-wrappers="#kt_app_sidebar_menu"
  data-kt-scroll-offset="5px"
  data-kt-scroll-save-state="true"
>
  <div
    class="menu menu-column menu-rounded menu-sub-indention fw-semibold fs-6"
    id="#kt_app_sidebar_menu"
    data-kt-menu="true"
    data-kt-menu-expand="false"
  >
    <div class="menu-item">
      <a class="menu-link without-sub" routerLink="/dashboard" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="element-11" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Dashboard</span>
      </a>
    </div>

    <div class="menu-item">
      <a class="menu-link without-sub" routerLink="/trips" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="geolocation-home" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Trips</span>
      </a>
    </div>

    <div class="menu-item">
      <a class="menu-link without-sub" routerLink="/drivers" routerLinkActive="active">
        <span class="menu-icon">
          <app-keenicon name="profile-user" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Drivers</span>
      </a>
    </div>

    @if (isSuperadmin) {
      <div class="menu-item">
        <div class="menu-content pt-8 pb-2">
          <span class="menu-section text-muted text-uppercase fs-8 ls-1">Superadmin</span>
        </div>
      </div>

      <div class="menu-item menu-accordion" data-kt-menu-trigger="click" routerLinkActive="here show">
        <span class="menu-link">
          <span class="menu-icon">
            <app-keenicon name="setting-3" class="fs-2"></app-keenicon>
          </span>
          <span class="menu-title">Citywall</span>
          <span class="menu-arrow"></span>
        </span>
        <div class="menu-sub menu-sub-accordion" routerLinkActive="menu-active-bg">
          <div class="menu-item">
            <a class="menu-link without-sub" routerLink="/citywall" routerLinkActive="active">
              <span class="menu-bullet"><span class="bullet bullet-dot"></span></span>
              <span class="menu-title">Overview</span>
            </a>
          </div>
          <div class="menu-item">
            <a class="menu-link without-sub" routerLink="/citywall/drivers/new" routerLinkActive="active">
              <span class="menu-bullet"><span class="bullet bullet-dot"></span></span>
              <span class="menu-title">Register Driver</span>
            </a>
          </div>
          <div class="menu-item">
            <a class="menu-link without-sub" routerLink="/citywall/units/new" routerLinkActive="active">
              <span class="menu-bullet"><span class="bullet bullet-dot"></span></span>
              <span class="menu-title">Create Unit</span>
            </a>
          </div>
        </div>
      </div>
    }

    <div class="menu-item">
      <div class="menu-content pt-8 pb-2">
        <span class="menu-section text-muted text-uppercase fs-8 ls-1">Session</span>
      </div>
    </div>

    <div class="menu-item">
      <a class="menu-link without-sub" routerLink="/auth/logout">
        <span class="menu-icon">
          <app-keenicon name="exit-right" class="fs-2"></app-keenicon>
        </span>
        <span class="menu-title">Logout</span>
      </a>
    </div>
  </div>
</div>
