<div class="card">
  <div class="card-body p-8">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-4 mb-8">
      <div>
        <div class="skeleton-pill skeleton-shimmer mb-3"></div>
        <div class="text-gray-700 fw-semibold">{{ label }}</div>
      </div>
      <div class="skeleton-chip skeleton-shimmer"></div>
    </div>

    <div class="d-flex flex-column gap-5">
      @for (row of skeletonRows; track row) {
        <div class="skeleton-row">
          <div class="skeleton-avatar skeleton-shimmer"></div>
          <div class="skeleton-content">
            <div class="skeleton-line skeleton-shimmer" [ngClass]="row % 3 === 0 ? 'w-75' : row % 3 === 1 ? 'w-90' : 'w-60'"></div>
            <div class="skeleton-line skeleton-line-sm skeleton-shimmer" [ngClass]="row % 2 === 0 ? 'w-40' : 'w-55'"></div>
          </div>
          <div class="skeleton-action skeleton-shimmer"></div>
        </div>
      }
    </div>
  </div>
</div>
