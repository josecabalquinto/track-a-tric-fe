<div class="card h-100">
  <div class="card-body d-flex flex-column justify-content-between">
    <div class="d-flex justify-content-between align-items-start mb-6">
      <span class="badge" [ngClass]="badgeClass">{{ label }}</span>
    </div>
    <div>
      <div class="fs-2hx fw-bold text-gray-900">{{ value }}</div>
      <div class="text-gray-500 fw-semibold mt-2">{{ hint }}</div>
    </div>
  </div>
</div>
