<div class="card">
  <div class="card-header border-0 pt-6">
    <h3 class="card-title">{{ isEdit ? 'Update Driver' : 'Register Driver' }}</h3>
  </div>
  <div class="card-body">
    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }
    @if (successMessage) {
      <div class="alert alert-success">{{ successMessage }}</div>
    }
    <form class="row g-5" [formGroup]="form">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input class="form-control" formControlName="name" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input class="form-control" formControlName="email" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input class="form-control" formControlName="phone" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Plate Number</label>
        <input class="form-control" formControlName="plate_number" />
      </div>
      <div class="col-md-6">
        <label class="form-label">License Number</label>
        <input class="form-control" formControlName="license_number" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Address</label>
        <input class="form-control" formControlName="address" />
      </div>
      <div class="col-12">
        <button class="btn btn-primary" type="button" [disabled]="isSaving" (click)="submit()">{{ isSaving ? 'Saving...' : 'Submit' }}</button>
      </div>
    </form>
  </div>
</div>
